# CI + serverga deploy (SSH kalit orqali; parol ishlatilmaydi).
# GitHub → Settings → Secrets → DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY

name: CI and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Actions → bu workflow → Run workflow (Secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY)
  workflow_dispatch:

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install and verify Django
        run: |
          pip install -r requirements.txt
          python manage.py migrate --noinput
          python manage.py check
          python manage.py test monitoring.tests -v 1

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_ORIGIN: https://clinicmonitoringapi.ziyrak.org

  deploy:
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
      # npm ci + build + migrate kichik VPSda 10 daqiqadan oshishi mumkin (default timeout = 10m).
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            APP=/opt/clinicmonitoring
            mkdir -p /opt
            if [ ! -d "$APP/.git" ]; then
              git clone https://github.com/aiziyrak-coder/Monitoring.git "$APP"
            fi
            cd "$APP"
            git remote set-url origin https://github.com/aiziyrak-coder/Monitoring.git
            chmod +x deploy/server-pull.sh deploy/remote-update.sh deploy/purge-nginx-clinicmonitoring-conflicts.sh deploy/open-hl7-port.sh || true
            bash deploy/server-pull.sh
            bash deploy/remote-update.sh
