# /etc/nginx/sites-available/0-clinicmonitoring-django.conf — Django uvicorn ASGI (port 8010 — 8000 boshqa loyihada)
# Upstream: WebSocket /socket.io/ uchun Upgrade boshqaruvi quyida.

upstream clinicmonitoring_django {
    server 127.0.0.1:8010;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name clinicmonitoring.ziyrak.org clinicmonitoringapi.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name clinicmonitoring.ziyrak.org;

    ssl_certificate /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/privkey.pem;

    # MUHIM: faqat shu papka — /var/www/clinicmonitoring (eski HTML) boshqa loyiha bo'lishi mumkin
    root /var/www/clinicmonitoring-vite;
    index index.html;

    add_header X-Clinic-Frontend "vite-spa" always;

    # Vite hashli fayllar — uzoq kesh; yangi deployda index.html boshqa nomga ishora qiladi
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Build versiyasi (public/version.txt) — yo'q bo'lsa 404, SPA emas (deploy tekshiruvi)
    location = /version.txt {
        default_type text/plain;
        charset utf-8;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files /version.txt =404;
    }

    # SPA: HTML qaytarilganda kesh kamroq ishlasin (CDN brauzerda eski bundle ushlab qolmasin)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name clinicmonitoringapi.ziyrak.org;

    ssl_certificate /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/privkey.pem;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location /socket.io/ {
        proxy_pass http://clinicmonitoring_django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://clinicmonitoring_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
