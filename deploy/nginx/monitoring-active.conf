# /etc/nginx/sites-available/0-clinicmonitoring-django.conf — Django Waitress :8000 + SPA
# Eski 18081 Docker proxy o‘rniga.

upstream clinicmonitoring_django {
    server 127.0.0.1:8000;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name clinicmonitoring.ziyrak.org clinicmonitoringapi.ziyrak.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name clinicmonitoring.ziyrak.org;

    ssl_certificate /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/privkey.pem;

    root /var/www/clinicmonitoring;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name clinicmonitoringapi.ziyrak.org;

    ssl_certificate /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clinicmonitoring.ziyrak.org/privkey.pem;

    client_max_body_size 20m;

    location /socket.io/ {
        proxy_pass http://clinicmonitoring_django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        proxy_pass http://clinicmonitoring_django;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
